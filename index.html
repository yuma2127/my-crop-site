<h2>ピーマンの特徴</h2>

<p>
ピーマンはナス科の野菜で、緑色の実とほどよい苦みが特徴です。ビタミンCやβ-カロテンなどの栄養を豊富に含み、健康維持に役立つ野菜として知られています。また、比較的育てやすく、家庭菜園でも人気があります。炒め物や肉詰め、サラダなどさまざまな料理に利用でき、夏から秋にかけて長期間収穫を楽しむことができます。
</p>

<h2>栽培のポイント</h2>

<ul>
<li>日当たりの良い場所で育てる。</li>
<li>土が乾いたら十分に水を与える。</li>
<li>追肥を行いながら育てる。</li>
</ul>
